<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リズムジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header>
    <h1>リズムジェネレーター</h1>
    <p class="app-description">このアプリは、拍構造をもとにドラムパターンを自動生成します。拍構造は <code>[[2,2],[2,2]]</code> のようなカッコの入れ子で表され、拍の強弱が構造的に決まります。その拍構造に対して「打率・重心・忠実度」を設定することでさまざまなリズムパターンを生成します。キック・スネア・ハイハットそれぞれに違うパラメータを設定でき、拍構造も楽器ごとに変えられるので、ポリリズムやポリメーターも表現できます。</p>
  </header>

  <!-- Visualizer -->
  <div class="viz-wrap" id="viz-wrap">
    <canvas id="viz-canvas"></canvas>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn" data-mode="single">個</button>
      <button class="mode-btn active" data-mode="all">全</button>
    </div>
    <button class="btn btn-generate" id="btn-generate">生成</button>
    <button class="btn btn-play" id="btn-play" disabled>&#9654; 再生</button>
    <button class="btn btn-download" id="btn-download" disabled>&#11015; DL</button>
  </div>
  <div class="bpm-row">
    <label>BPM</label>
    <input type="range" id="bpm" value="120" min="40" max="200" step="1">
    <span class="param-value" id="bpm-val">120</span>
  </div>

  <!-- Pattern display -->
  <div class="grid-section" id="grid-section">
    <div class="inst-header">パターン</div>
    <div class="pattern-bank" id="pattern-bank"></div>
    <hr style="border:none; border-top:2px dashed var(--border); margin:8px 0;">
    <div class="empty-msg" id="empty-msg">「生成」を押してリズムパターンを作成</div>
    <div id="pattern-display" style="display:none;">
      <div class="grid-row">
        <span class="grid-label kick">K</span>
        <div class="grid-steps" id="grid-kick"></div>
      </div>
      <div class="grid-row">
        <span class="grid-label snare">S</span>
        <div class="grid-steps" id="grid-snare"></div>
      </div>
      <div class="grid-row">
        <span class="grid-label hihat">H</span>
        <div class="grid-steps" id="grid-hihat"></div>
      </div>
    </div>
  </div>

  <!-- Repeat Map -->
  <div class="grid-section" id="repeat-map-section">
    <div class="inst-header" style="display:flex; align-items:center; gap:8px;">
      リピートマップ
      <div class="mode-toggle" id="repeat-map-toggle">
        <button class="mode-btn" data-mode="off" style="padding:4px 10px; font-size:14px; box-shadow:2px 2px 0 #999;">無効</button>
        <button class="mode-btn active" data-mode="on" style="padding:4px 10px; font-size:14px; box-shadow:2px 2px 0 #999;">有効</button>
      </div>
      <button class="btn btn-generate" id="btn-regen-map" style="padding:4px 10px; font-size:14px;">再生成</button>
      <button class="btn btn-generate" id="btn-apply-map" style="padding:4px 10px; font-size:14px;">適用</button>
    </div>
    <div id="repeat-map-body"></div>
  </div>

  <!-- Default structure + Tree visualization -->
  <div class="tree-viz" id="tree-viz-wrap">
    <div class="inst-header">既定拍構造</div>
    <div class="param-row" style="margin-bottom:10px;">
      <button class="btn-nav" id="struct-prev">&#9664;</button>
      <select id="default-struct" class="struct-select"></select>
      <button class="btn-nav" id="struct-next">&#9654;</button>
    </div>
    <div id="tree-struct-label" style="text-align:center; font-size:16px; font-family:var(--pixel-font); color:var(--text-muted); margin-bottom:10px;"></div>
    <div style="display:flex;"><div id="tree-viz" style="margin:0 auto;"></div></div>
  </div>

  <!-- Instruments (dynamically generated) -->
  <div id="instruments-container"></div>


</div>


<script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/build/Tone.js"></script>
<script src="genRhythm.js"></script>
<script src="genRepeat.js"></script>
<script src="js/constants.js?v=2"></script>
<script src="js/state.js?v=2"></script>
<script src="js/tree.js?v=2"></script>
<script src="js/ui-helpers.js?v=2"></script>
<script src="js/grid.js?v=2"></script>
<script src="js/instrument-ui.js?v=2"></script>
<script src="js/prob-chart.js?v=2"></script>
<script src="js/tree-viz.js?v=2"></script>
<script src="js/repeat-map.js?v=2"></script>
<script src="js/pattern-bank.js?v=2"></script>
<script src="js/audio.js?v=2"></script>
<script src="js/visualizer.js?v=2"></script>
<script src="js/cursor.js?v=2"></script>
<script src="js/playback.js?v=2"></script>
<script src="js/export.js?v=2"></script>
<script src="js/init.js?v=2"></script>
</body>
</html>
